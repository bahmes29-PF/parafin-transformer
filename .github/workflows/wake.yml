name: Wake Streamlit App

on:
  schedule:
    - cron: '0 */4 * * *' # Runs every 4 hours
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  wake-app:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium

      - name: Wake up app with Headless Browser
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              print('Navigating to Parafin Transformer...')
              page.goto('https://parafin-transformer.streamlit.app/')
              page.wait_for_timeout(10000) # Waits 10 full seconds for the Streamlit WebSocket to connect
              print('Successfully loaded and woke the app!')
              browser.close()
          "
